<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#f4ead3" />
    <link rel="icon" type="image/png" href="/assets/terre-logo-official.png" />
    <title>Sayfa bulunamadı | Terre Anadolu Şarküteri</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f4ead3; color: #472600; font-family: Arial, sans-serif; }
      main { width: min(100%, 620px); text-align: center; }
      img { width: 110px; height: 110px; border-radius: 50%; }
      .logo { display: inline-block; margin-bottom: 28px; }
      p { line-height: 1.65; }
      .code { margin-bottom: 8px; color: #d91417; font-size: .8rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
      h1 { margin: 0 0 20px; font-family: Georgia, serif; font-size: clamp(2.8rem, 10vw, 5.5rem); line-height: 1; letter-spacing: -.05em; }
      a.button { display: inline-flex; margin-top: 18px; padding: 13px 22px; border-radius: 999px; background: #d91417; color: white; font-weight: 700; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <a class="logo" href="/" aria-label="Ana sayfaya dön"><img src="/assets/terre-logo-official.png" alt="Terre Anadolu Şarküteri" width="1200" height="1200" /></a>
      <p class="code">404 • Sayfa bulunamadı</p>
      <h1>Aradığınız lezzet burada değil.</h1>
      <p>Bağlantı değişmiş veya sayfa kaldırılmış olabilir. Terre Anadolu Şarküteri ana sayfasına dönebilirsiniz.</p>
      <a class="button" href="/">Ana sayfaya dön</a>
    </main>
  </body>
</html>
